<h2>Bestätige deine E-Mail-Adresse</h2>
<p>
  Bestätige deine Adresse, um dein Konto für die Schulung fertig einzurichten.
</p>
<p>
  <a
    href="{{ .SiteURL }}/api/auth/callback?token_hash={{ .TokenHash }}&amp;type=email&amp;next=%2Fcheckout"
  >
    E-Mail-Adresse bestätigen
  </a>
</p>
<p>Wenn du kein Konto angelegt hast, kannst du diese Nachricht ignorieren.</p>
